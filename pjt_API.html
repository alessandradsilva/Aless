<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pokédex</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Pokédex</h1>
  </header>

  <main>

  <!-- Busca -->
  <section class="busca">
    <input 
      type="text" 
      id="inputBusca" 
      placeholder="Digite o nome do Pokémon">
    
    <button id="btnBuscar">Buscar</button>
  </section>

  <!-- Loading -->
  <p id="loading" style="display: none;">Carregando...</p>

  <!-- Lista de Pokémons -->
  <section id="listaPokemons" class="lista">
    <!-- JS vai inserir aqui -->
  </section>

</main>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
